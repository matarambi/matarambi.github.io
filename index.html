<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Institutional Credential Registry</title>

<style>
body {
    font-family: Georgia, "Times New Roman", serif;
    background-color: #f3f5f7;
    margin: 0;
    padding: 0;
}

.header {
    text-align: center;
    padding: 60px 20px 20px 20px;
}

.header h1 {
    font-size: 26px;
    margin-bottom: 5px;
}

.divider {
    width: 100px;
    height: 2px;
    background-color: #0c2d57;
    margin: 20px auto;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 60px;
    box-shadow: 0 0 15px rgba(0,0,0,0.05);
    text-align: center;
}

input {
    width: 80%;
    padding: 10px;
    font-family: monospace;
    margin-top: 20px;
    border: 1px solid #ccc;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #0c2d57;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.note {
    margin-top: 20px;
    font-size: 13px;
    color: #666;
}
</style>
</head>

<body>

<div class="header">
    <h1>Institutional Credential Registry</h1>
    <div class="divider"></div>
</div>

<div class="container">

    <p>
        Enter a valid 32-character hexadecimal verification code.
    </p>

    <input type="text" id="codeInput" maxlength="32" placeholder="Enter verification code">

    <br>

    <button onclick="verifyCode()">Verify</button>

    <div class="note">
        Only officially registered records will return a result.
    </div>

</div>

<script>
function verifyCode() {
    var code = document.getElementById("codeInput").value.trim();
    if(code.length === 32) {
        window.location.href = code + ".html";
    } else {
        alert("Invalid verification code format.");
    }
}
</script>

</body>
</html>
