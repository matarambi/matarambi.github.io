<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Institutional Credential Registry</title>

<style>
body {
    font-family: Georgia, "Times New Roman", serif;
    background-color: #f3f5f7;
    margin: 0;
    padding: 0;
}

.header {
    text-align: center;
    padding: 60px 20px 20px 20px;
}

.header h1 {
    font-size: 26px;
    margin-bottom: 5px;
}

.divider {
    width: 100px;
    height: 2px;
    background-color: #0c2d57;
    margin: 20px auto;
}

.container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 60px;
    box-shadow: 0 0 15px rgba(0,0,0,0.05);
    text-align: center;
}

.code-box {
    margin-top: 30px;
    font-family: monospace;
    font-size: 14px;
    padding: 12px;
    border: 1px solid #ccc;
    display: inline-block;
    background-color: #f9f9f9;
}
</style>
</head>

<body>

<div class="header">
    <h1>Institutional Credential Registry</h1>
    <div class="divider"></div>
</div>

<div class="container">
    <p>
        This portal provides archival verification of officially registered credential records.
    </p>

    <div class="code-box">
        Verification requires a valid 32-character hexadecimal reference code.
    </div>
</div>

</body>
</html>
